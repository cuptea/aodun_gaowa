<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {%- if page.page_key == 'about' -%}
            {{ site.data.content.about.page_titles[page.lang] | default: site.title }}
        {%- elsif page.page_key -%}
            {{ site.data.content[page.page_key].page_title | default: site.title }}
        {%- else -%}
            {{ page.title | default: site.title }}
        {%- endif -%}
    </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        body {
            font-family: var(--font-sans);
            background-color: #FDFCFB;
            color: #1A1A1A;
        }
        .font-serif { font-family: var(--font-serif); }
        .font-mono { font-family: var(--font-mono); }
    </style>
</head>
<body class="leading-relaxed">
    {% include nav.html %}
    {{ content }}
</body>
</html>
