        "heading": "Schwerpunkte und Leistungen",
        "items": [
          {
            "title": "Strategische Beschaffung & Sourcing in China",
            "description": "Identifikation, Bewertung und Qualifizierung geeigneter chinesischer Lieferanten und Auftragsfertiger – von Komponenten über Maschinen bis hin zu kompletten Fertigungslinien und Prüfmitteln."
          },
          {
            "title": "Marktentwicklung & Business Development",
            "description": "Lokalisierte Eintrittsstrategien für chinesische Unternehmen in der DACH-Region sowie Unterstützung deutscher Unternehmen beim Aufbau nachhaltiger Marktpositionen in China."
          },
          {
            "title": "Technische Klärung & Projektmanagement",
            "description": "Begleitung internationaler Projekte entlang technischer Schnittstellen, Durchführung von Machbarkeitsbewertungen sowie Unterstützung in Industrialisierungs- und Qualitätsprozessen."
          },
          {
            "title": "Partnerschaften & Interkulturelle Kooperationen",
            "description": "Förderung von B2B-Vernetzung, Begleitung von Verhandlungen in Deutsch und Chinesisch sowie Aufbau stabiler Kooperationen über Kultur- und Systemgrenzen hinweg."
          }
        ]
      },
