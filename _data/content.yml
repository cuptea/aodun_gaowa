datenschutz:
  page_title: "Gaowa Consulting | Datenschutzerklärung"
  heading: Datenschutzerklärung
  subtitle: "Stand: Juni 2026"
  sections:
    - heading: "1. Datenschutz auf einen Blick"
      blocks:
        - type: h3
          text: Allgemeine Hinweise
        - type: p
          text: >
            Die folgenden Hinweise geben einen einfachen Überblick darüber, was mit Ihren personenbezogenen
            Daten passiert, wenn Sie diese Website besuchen. Personenbezogene Daten sind alle Daten, mit denen
            Sie persönlich identifiziert werden können. Ausführliche Informationen zum Thema Datenschutz
            entnehmen Sie unserer unter diesem Text aufgeführten Datenschutzerklärung.
        - type: h3
          text: Datenerfassung auf dieser Website
        - type: qa
          question: Wer ist verantwortlich für die Datenerfassung auf dieser Website?
          answer: >
            Die Datenverarbeitung auf dieser Website erfolgt durch den Websitebetreiber. Dessen Kontaktdaten
            können Sie dem Abschnitt „Hinweis zur verantwortlichen Stelle" in dieser Datenschutzerklärung entnehmen.
        - type: qa
          question: Wie erfassen wir Ihre Daten?
          answer: >
            Ihre Daten werden zum einen dadurch erhoben, dass Sie uns diese mitteilen. Hierbei kann es sich
            z. B. um Daten handeln, die Sie in ein Kontaktformular oder per E-Mail eingeben. Andere Daten
            werden automatisch oder nach Ihrer Einwilligung beim Besuch der Website durch unsere IT-Systeme erfasst.
            Das sind vor allem technische Daten (z. B. Internetbrowser, Betriebssystem oder Uhrzeit des
            Seitenaufrufs). Die Erfassung dieser Daten erfolgt automatisch, sobald Sie diese Website betreten.
        - type: qa
          question: Wofür nutzen wir Ihre Daten?
          answer: >
            Ein Teil der Daten wird erhoben, um eine fehlerfreie Bereitstellung der Website zu gewährleisten.
            Andere Daten können zur Analyse Ihres Nutzerverhaltens verwendet werden, sofern Sie eingewilligt haben.
        - type: qa
          question: Welche Rechte haben Sie bezüglich Ihrer Daten?
          answer: >
            Sie haben jederzeit das Recht, unentgeltlich Auskunft über Herkunft, Empfänger und Zweck Ihrer
            gespeicherten personenbezogenen Daten zu erhalten. Sie haben außerdem ein Recht, die Berichtigung
            oder Löschung dieser Daten zu verlangen. Wenn Sie eine Einwilligung zur Datenverarbeitung erteilt
            haben, können Sie diese Einwilligung jederzeit für die Zukunft widerrufen. Außerdem haben Sie das
            Recht, unter bestimmten Umständen die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten
            zu verlangen. Des Weiteren steht Ihnen ein Beschwerderecht bei der zuständigen Aufsichtsbehörde zu.

    - heading: "2. Hosting"
      blocks:
        - type: p
          text: "Wir hosten die Inhalte unserer Website bei folgendem Anbieter:"
        - type: h3
          text: GitHub Pages
        - type: link
          before: >
            Anbieter ist die GitHub Inc., 88 Colin P Kelly Jr St, San Francisco, CA 94107, USA. Wenn Sie unsere
            Website besuchen, werden Ihre personenbezogenen Daten auf den Servern von GitHub verarbeitet.
            Hierbei können auch personenbezogene Daten an das Mutterunternehmen von GitHub in den USA übermittelt
            werden. GitHub verfügt über eine Zertifizierung nach dem „EU-US Data Privacy Framework" (DPF).
            Weitere Informationen entnehmen Sie der Datenschutzerklärung von GitHub:
          url: https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement
          label: https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement
          after: "."

    - heading: "3. Allgemeine Hinweise und Pflichtinformationen"
      blocks:
        - type: h3
          text: Datenschutz
        - type: p
          text: >
            Die Betreiber dieser Seiten nehmen den Schutz Ihrer persönlichen Daten sehr ernst. Wir behandeln
            Ihre personenbezogenen Daten vertraulich und entsprechend den gesetzlichen Datenschutzvorschriften
            sowie dieser Datenschutzerklärung. Wenn Sie diese Website benutzen, werden verschiedene
            personenbezogene Daten erhoben. Personenbezogene Daten sind Daten, mit denen Sie persönlich
            identifiziert werden können.
        - type: h3
          text: Hinweis zur verantwortlichen Stelle
        - type: p
          text: "Die verantwortliche Stelle für die Datenverarbeitung auf dieser Website ist:"
        - type: address
          lines:
            - Aodun Gaowa
            - GP-I Consulting GmbH
            - München, Deutschland
            - "E-Mail: a.gaowa@gp-iconsulting.de"
            - "Telefon: +49 (0)152 3390 3259"
        - type: p
          text: >
            Verantwortliche Stelle ist die natürliche oder juristische Person, die allein oder gemeinsam mit
            anderen über die Zwecke und Mittel der Verarbeitung von personenbezogenen Daten (z. B. Namen,
            E-Mail-Adressen o. Ä.) entscheidet.
        - type: h3
          text: Speicherdauer
        - type: p
          text: >
            Soweit innerhalb dieser Datenschutzerklärung keine speziellere Speicherdauer genannt wurde,
            verbleiben Ihre personenbezogenen Daten bei uns, bis der Zweck für die Datenverarbeitung entfällt.
            Wenn Sie ein berechtigtes Löschersuchen geltend machen oder eine Einwilligung zur Datenverarbeitung
            widerrufen, werden Ihre Daten gelöscht, sofern wir keine anderen rechtlich zulässigen Gründe für
            die Speicherung Ihrer personenbezogenen Daten haben.
        - type: h3
          text: Widerruf Ihrer Einwilligung zur Datenverarbeitung
        - type: p
          text: >
            Viele Datenverarbeitungsvorgänge sind nur mit Ihrer ausdrücklichen Einwilligung möglich. Sie können
            eine bereits erteilte Einwilligung jederzeit widerrufen. Die Rechtmäßigkeit der bis zum Widerruf
            erfolgten Datenverarbeitung bleibt vom Widerruf unberührt.
        - type: h3
          text: Recht auf Datenübertragbarkeit
        - type: p
          text: >
            Sie haben das Recht, Daten, die wir auf Grundlage Ihrer Einwilligung oder in Erfüllung eines Vertrags
            automatisiert verarbeiten, an sich oder an einen Dritten in einem gängigen, maschinenlesbaren Format
            aushändigen zu lassen.
        - type: h3
          text: Auskunft, Berichtigung und Löschung
        - type: p
          text: >
            Sie haben im Rahmen der geltenden gesetzlichen Bestimmungen jederzeit das Recht auf unentgeltliche
            Auskunft über Ihre gespeicherten personenbezogenen Daten, deren Herkunft und Empfänger und den
            Zweck der Datenverarbeitung und ggf. ein Recht auf Berichtigung oder Löschung dieser Daten.
        - type: h3
          text: Recht auf Einschränkung der Verarbeitung
        - type: p
          text: >
            Sie haben das Recht, die Einschränkung der Verarbeitung Ihrer personenbezogenen Daten zu verlangen.
            Hierzu können Sie sich jederzeit an uns wenden.
        - type: h3
          text: SSL- bzw. TLS-Verschlüsselung
        - type: p
          text: >
            Diese Seite nutzt aus Sicherheitsgründen und zum Schutz der Übertragung vertraulicher Inhalte,
            wie zum Beispiel Anfragen, die Sie an uns als Seitenbetreiber senden, eine SSL- bzw.
            TLS-Verschlüsselung. Eine verschlüsselte Verbindung erkennen Sie daran, dass die Adresszeile des
            Browsers von „http://" auf „https://" wechselt und an dem Schloss-Symbol in Ihrer Browserzeile.

    - heading: "4. Datenerfassung auf dieser Website"
      blocks:
        - type: h3
          text: Server-Log-Dateien
        - type: p
          text: >
            Der Provider der Seiten erhebt und speichert automatisch Informationen in so genannten
            Server-Log-Dateien, die Ihr Browser automatisch an uns übermittelt. Dies sind:
        - type: ul
          items:
            - Browsertyp und Browserversion
            - verwendetes Betriebssystem
            - Referrer URL
            - Hostname des zugreifenden Rechners
            - Uhrzeit der Serveranfrage
            - IP-Adresse
        - type: p
          text: >
            Eine Zusammenführung dieser Daten mit anderen Datenquellen wird nicht vorgenommen. Die Erfassung
            dieser Daten erfolgt auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO. Der Websitebetreiber hat ein
            berechtigtes Interesse an der technisch fehlerfreien Darstellung und der Optimierung seiner Website.
        - type: h3
          text: Kontaktaufnahme per E-Mail
        - type: p
          text: >
            Wenn Sie uns per E-Mail kontaktieren, wird Ihre Anfrage inklusive aller daraus hervorgehenden
            personenbezogenen Daten (Name, Anfrage) zum Zwecke der Bearbeitung Ihres Anliegens bei uns
            gespeichert und verarbeitet. Diese Daten geben wir nicht ohne Ihre Einwilligung weiter. Die
            Verarbeitung dieser Daten erfolgt auf Grundlage von Art. 6 Abs. 1 lit. b DSGVO, sofern Ihre Anfrage
            mit der Erfüllung eines Vertrags zusammenhängt oder zur Durchführung vorvertraglicher Maßnahmen
            erforderlich ist. In allen übrigen Fällen beruht die Verarbeitung auf unserem berechtigten Interesse
            an der effektiven Bearbeitung der an uns gerichteten Anfragen (Art. 6 Abs. 1 lit. f DSGVO).

    - heading: "5. Ihre Rechte als betroffene Person"
      blocks:
        - type: p
          text: "Sie haben folgende Rechte:"
        - type: ul
          items:
            - Recht auf Auskunft (Art. 15 DSGVO)
            - Recht auf Berichtigung (Art. 16 DSGVO)
            - Recht auf Löschung (Art. 17 DSGVO)
            - Recht auf Einschränkung der Verarbeitung (Art. 18 DSGVO)
            - Recht auf Datenübertragbarkeit (Art. 20 DSGVO)
            - Widerspruchsrecht (Art. 21 DSGVO)
            - Recht auf Beschwerde bei einer Aufsichtsbehörde (Art. 77 DSGVO)
        - type: link
          before: >
            Zuständige Aufsichtsbehörde in Bayern ist der Bayerische Landesbeauftragte für den Datenschutz
            (BayLDA), Postfach 1349, 91504 Ansbach,
          url: https://www.lda.bayern.de
          label: www.lda.bayern.de
          after: "."

